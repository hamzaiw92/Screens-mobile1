<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نتيجة التوافق</title>
<style>
body {
    font-family: Tahoma;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
}

h1 { color: #38bdf8; }

.card {
    background: #1e293b;
    padding: 15px;
    margin: 10px auto;
    border-radius: 15px;
    width: 80%;
    text-align: center;
}

button {
    padding: 10px 20px;
    margin-top: 15px;
    border-radius: 10px;
    border: none;
    background: #38bdf8;
    color: black;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.3s;
}

button:hover {
    background: #22caff;
}
</style>
</head>
<body>

<h1>📱 نتيجة التوافق</h1>
<div id="resultBox">جارٍ تحميل البيانات...</div>
<button onclick="goHome()">⬅ رجوع</button>

<script>
function normalize(text){
    return text.toLowerCase().replace(/\s+/g, "");
}
// نفترض أن company تم اختيارها في الصفحة الأولى وحفظت في localStorage
let company = localStorage.getItem("company"); 
let model = localStorage.getItem("model");

let fileName = "screens/" + company.toLowerCase() + ".json"; // اسم ملف الشركة

fetch(fileName)
.then(response => response.json())
.then(data => {
    let found = data.filter(s => normalize(s.phone) === normalize(model));
    resultBox.innerHTML = "";
    if(found.length > 0){
        found.forEach(s => {
            resultBox.innerHTML += `
            <div class="card">
            🏷️ ${s.brand} <br>
            📱 ${s.phone} <br>
            🔄 البديل: ${s.replace}
            </div>`;
        });
    } else {
        resultBox.innerHTML = `<div class="card">❌ لا يوجد توافق لهذا الجهاز</div>`;
    }
})
.catch(err => {
    resultBox.innerHTML = `<div class="card">❌ خطأ في تحميل بيانات الشركة</div>`;
    console.error(err);
});

function goHome(){
    window.location.href = "index.html";
}
</script>

</body>
</html>

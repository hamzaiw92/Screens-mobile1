<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>النتيجة</title>

<style>
body {
    background:#0f172a;
    color:white;
    text-align:center;
}
.card {
    background:#1e293b;
    margin:10px;
    padding:15px;
    border-radius:10px;
}
</style>

</head>

<body>

<h2>📱 نتيجة التوافق</h2>
<div id="result"></div>

<script>

let resultDiv = document.getElementById("result");
let search = localStorage.getItem("search").toLowerCase();

// قائمة الشركات (أسماء ملفات JSON)
let companies = [
    "samsung",
    "xiaomi",
    "redmi",
    "realme",
    "infinix",
    "tecno",
    "vivo",
    "huawei",
    "honor"
];

// تحميل كل JSON
companies.forEach(company => {

    fetch(company + ".json")
    .then(res => res.json())
    .then(data => {

        data.forEach(item => {

            if(item.phone.toLowerCase().includes(search)){
                resultDiv.innerHTML += `
                <div class="card">
                🏷️ ${company} <br>
                📱 ${item.phone} <br>
                🔄 البديل: ${item.replace}
                </div>`;
            }

        });

    });

});

</script>

</body>
</html>

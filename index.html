<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توافق الشاشات</title>

<style>
body {
    font-family: Tahoma;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 15px;
}

h1 { color: #38bdf8; }

input, select, button {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
}

input, select { width: 80%; }

button {
    background: #38bdf8;
    color: black;
    cursor: pointer;
}

.card {
    background: #1e293b;
    padding: 15px;
    margin: 10px;
    border-radius: 15px;
}
</style>
</head>

<body>

<!-- الصفحة الرئيسية -->
<div id="home">

<h1>📱 توافق الشاشات</h1>

<input type="text" id="phone" placeholder="📱 اسم الجهاز (مثلاً A20s)">

<select id="brand">
<option value="">🏷️ اختر الشركة</option>
<option>Samsung</option>
<option>Xiaomi</option>
<option>Redmi</option>
<option>Realme</option>
<option>Infinix</option>
<option>Tecno</option>
<option>Vivo</option>
<option>Huawei</option>
<option>Honor</option>
</select>

<button onclick="goToResult()">بحث</button>

</div>

<!-- الصفحة الثانية -->
<div id="resultPage" style="display:none;">

<h1>📱 نتيجة التوافق</h1>

<div id="resultBox"></div>

<button onclick="goHome()">⬅ رجوع</button>

</div>

<script>

// تنظيف النص
function normalize(text){
    return text.toLowerCase().replace(/\s+/g, "");
}

// البيانات
let screens = [];

function loadCompany(company){
    fetch(company + ".json")
    .then(response => response.json())
    .then(data => {
        data.forEach(d => screens.push({brand: company, ...d}));
    })
    .catch(err => console.error("خطأ في تحميل "+company+".json", err));
}

// تحميل كل الشركات
["Samsung","Xiaomi","Redmi","Realme","Infinix","Tecno","Vivo","Huawei","Honor"].forEach(loadCompany);


// بحث
function goToResult(){

    let phoneInput = normalize(document.getElementById("phone").value);
    let brandInput = normalize(document.getElementById("brand").value);

    let resultBox = document.getElementById("resultBox");

    let found = screens.filter(s => {
        let phone = normalize(s.phone);
        let brand = normalize(s.brand);

        return (
            (phone.includes(phoneInput) || phoneInput === "") &&
            (brand.includes(brandInput) || brandInput === "")
        );
    });

    resultBox.innerHTML = "";

    if(found.length > 0){
        found.forEach(s => {
            resultBox.innerHTML += `
            <div class="card">
            🏷️ ${s.brand} <br>
            📱 ${s.phone} <br><br>
            🔄 البديل: ${s.replace}
            </div>`;
        });
    } else {
        resultBox.innerHTML = `
        <div class="card">
        ❌ ماكو توافق
        </div>`;
    }

    document.getElementById("home").style.display = "none";
    document.getElementById("resultPage").style.display = "block";
}

// رجوع
function goHome(){
    document.getElementById("home").style.display = "block";
    document.getElementById("resultPage").style.display = "none";
}

</script>

</body>
</html>

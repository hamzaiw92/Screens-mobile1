<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>توافق الشاشات</title>

<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

.box{
background:#1e293b;
padding:20px;
border-radius:10px;
width:350px;
margin:auto;
margin-top:40px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
font-size:16px;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

.result{
margin-top:20px;
background:#020617;
padding:15px;
border-radius:8px;
}
</style>

</head>
<body>

<h1>📱 موقع توافق الشاشات</h1>

<div class="box">

<select id="brand">
<option value="">اختر الشركة</option>

<option value="samsung">سامسونك</option>
<option value="xiaomi">شاومي</option>
<option value="realme">ريلمي</option>
<option value="infinix">انفنكس</option>
<option value="huawei">هواوي</option>

<option value="vivo">فيفو</option>
<option value="tecno">تكنو</option>

</select>

<select id="phone">
<option value="">اختر الجهاز</option>
</select>

<button onclick="check()">عرض التوافق</button>

<div class="result" id="result">
اختر جهاز لمعرفة توافق الشاشة
</div>

</div>

<script>

let phones = {}

const brand = document.getElementById("brand")
const phone = document.getElementById("phone")

brand.onchange = async function(){

phone.innerHTML="<option>اختر الجهاز</option>"

let company = this.value

if(!company) return

let res = await fetch(company + ".json")
phones = await res.json()

for(let d in phones){

let op = document.createElement("option")
op.text = d
phone.add(op)

}

}

function check(){

let p = phone.value

if(!phones[p]){

document.getElementById("result").innerHTML="لا توجد معلومات"
return

}

let list = phones[p]

document.getElementById("result").innerHTML =
"الأجهزة المتوافقة:<br><b>"+list.join(" , ")+"</b>"

}

</script>

</body>
</html>

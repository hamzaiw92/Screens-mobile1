<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<title>توافق شاشات الهاتف</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#2196f3,#673ab7);
text-align:center;
color:white;
margin:0;
padding:0;
}

.container{
margin-top:60px;
background:white;
color:#333;
width:90%;
max-width:500px;
margin-left:auto;
margin-right:auto;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
margin-bottom:20px;
}

select{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
font-size:18px;
border:none;
border-radius:8px;
background:#4caf50;
color:white;
cursor:pointer;
}

button:hover{
background:#43a047;
}

#result{
margin-top:20px;
padding:15px;
background:#f5f5f5;
border-radius:10px;
font-size:17px;
}

</style>

</head>

<body>

<div class="container">

<h1>توافق شاشات الموبايل</h1>

<select id="company">
<option value="">اختر الشركة</option>

<option value="xiaomi">Xiaomi</option>
<option value="redmi">Redmi</option>
<option value="realme">Realme</option>
<option value="oppo">Oppo</option>
<option value="vivo">Vivo</option>
<option value="samsung">Samsung</option>
<option value="huawei">Huawei</option>
<option value="honor">Honor</option>
<option value="infinix">Infinix</option>
<option value="tecno">Tecno</option>
<option value="itel">Itel</option>

</select>

<select id="phone">
<option>اختر الجهاز</option>
</select>

<button onclick="show()">عرض التوافق</button>

<div id="result"></div>

</div>

<script>

let phones = {}

let company = document.getElementById("company")
let phone = document.getElementById("phone")

company.onchange = async function(){

phone.innerHTML = "<option>اختر الجهاز</option>"

let comp = this.value

if(!comp) return

try{

let res = await fetch(comp + ".json")

phones = await res.json()

for(let d in phones){

let op = document.createElement("option")

op.text = d

phone.add(op)

}

}catch{

alert("ملف الشركة غير موجود")

}

}

function show(){

let p = phone.value

if(!phones[p]) return

document.getElementById("result").innerHTML =
"الأجهزة المتوافقة:<br><b>" + phones[p].join(" , ") + "</b>"

}

</script>

</body>
</html>

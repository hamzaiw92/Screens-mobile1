ڜ<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>توافق شاشات الهواتف</title>

<style>

body{
font-family:Arial;
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
margin:0;
color:white;
text-align:center;
}

.container{
width:90%;
max-width:700px;
margin:auto;
margin-top:40px;
background:white;
color:#333;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
margin-bottom:20px;
}

.company-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:20px;
}

.company{
background:#f5f5f5;
padding:10px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.company:hover{
transform:scale(1.1);
background:#e0e0e0;
}

.company img{
width:60px;
}

select{
width:100%;
padding:10px;
margin-top:10px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#2e7d32;
border:none;
color:white;
font-size:18px;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

#result{
margin-top:20px;
font-size:18px;
background:#f1f1f1;
padding:15px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>توافق شاشات الهواتف</h1>

<div class="company-grid">

<div class="company" onclick="loadCompany('xiaomi')">
<img src="https://upload.wikimedia.org/wikipedia/commons/2/29/Xiaomi_logo.svg">
<p>Xiaomi</p>
</div>

<div class="company" onclick="loadCompany('redmi')">
<img src="https://upload.wikimedia.org/wikipedia/commons/2/29/Xiaomi_logo.svg">
<p>Redmi</p>
</div>

<div class="company" onclick="loadCompany('realme')">
<img src="https://upload.wikimedia.org/wikipedia/commons/9/9d/Realme_logo.svg">
<p>Realme</p>
</div>

<div class="company" onclick="loadCompany('oppo')">
<img src="https://upload.wikimedia.org/wikipedia/commons/9/9d/OPPO_LOGO_2019.svg">
<p>Oppo</p>
</div>

<div class="company" onclick="loadCompany('vivo')">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Vivo_logo_2019.svg">
<p>Vivo</p>
</div>

<div class="company" onclick="loadCompany('samsung')">


<img src="https://upload.wikimedia.org/wikipedia/commons/2/24/Samsung_Logo.svg">٠
<p>Samsung</p>
</div>

<div class="company" onclick="loadCompany('huawei')">
<img src="https://upload.wikimedia.org/wikipedia/en/0/04/Huawei_Standard_logo.svg">
<p>Huawei</p>
</div>

<div class="company" onclick="loadCompany('honor')">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/00/Honor_logo.svg">
<p>Honor</p>
</div>

<div class="company" onclick="loadCompany('infinix')">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/0e/Infinix-logo.svg">
<p>Infinix</p>
</div>

<div class="company" onclick="loadCompany('tecno')">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/4b/Tecno-logo.svg">
<p>Tecno</p>
</div>

<div class="company" onclick="loadCompany('itel')">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5b/Itel_Mobile_logo.svg">
<p>Itel</p>
</div>

</div>

<select id="phone">
<option>اختر الجهاز</option>
</select>

<button onclick="show()">عرض التوافق</button>

<div id="result"></div>

</div>

<script>

let phones = {}

async function loadCompany(company){

try{

let res = await fetch(company + ".json")

phones = await res.json()

let phone = document.getElementById("phone")

phone.innerHTML=""

for(let d in phones){

let op=document.createElement("option")

op.text=d

phone.add(op)

}

}catch{

alert("ملف الشركة غير موجود")

}

}

function show(){

let p=document.getElementById("phone").value

if(!phones[p]) return

document.getElementById("result").innerHTML =
"الأجهزة المتوافقة:<br><b>"+phones[p].join(", ")+"</b>"

}

</script>

</body>
</html>
